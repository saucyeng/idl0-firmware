name: firmware-release

# Builds the ESP-IDF firmware and publishes it to a GitHub Release on a version
# tag. Version of record = the tag (leading `v` stripped) -> version.txt ->
# esp_app_desc_t.version, which the app reads over /ping and the §7.3 status line
# to offer OTA updates.
#
# Release asset contract: exactly one `.bin` asset per release —
# `idl0-firmware-v<ver>.bin` — plus its checksum sidecar
# `idl0-firmware-v<ver>.bin.sha256`, in `sha256sum` output format
# (`<hex>  <filename>`). The app (app/lib/transport/firmware_catalog.dart in
# idl0-app) matches release assets by `.bin`/`.sha256` suffix and takes the
# LAST `.bin` asset it sees, so publishing a second `.bin` asset on a release
# is hazardous — don't add one (this bit CI once: `build/` also contains
# `ota_data_initial.bin`, an 8-byte otadata seed, which a naive `find`/`head`
# could publish instead of the app image). The app also parses the sha256
# file's first whitespace-delimited token as the expected hash, which is why
# `sha256sum` format (not a bare hex file) is required — it doubles as
# something a human can verify with `sha256sum -c`.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Derive version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "$VERSION" > version.txt

      - name: Build firmware (ESP-IDF)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32c6
          path: '.'

      - name: Stage release assets
        id: assets
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          APP_BIN=build/idl0_firmware.bin   # fixed by project(idl0_firmware) in CMakeLists.txt
          test -f "$APP_BIN" || { echo "::error::app image not found at $APP_BIN"; exit 1; }
          V="${VERSION}"
          cp "$APP_BIN" "build/idl0-firmware-v${V}.bin"
          (cd build && sha256sum "idl0-firmware-v${V}.bin" > "idl0-firmware-v${V}.bin.sha256")
          echo "bin=build/idl0-firmware-v${V}.bin" >> "$GITHUB_OUTPUT"
          echo "sha=build/idl0-firmware-v${V}.bin.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Firmware ${{ steps.ver.outputs.version }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.bin }}
            ${{ steps.assets.outputs.sha }}
