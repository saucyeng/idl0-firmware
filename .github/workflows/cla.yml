name: cla

# CLA Assistant Lite — self-hosted, no third-party service. Signatures are
# stored in this repo on the `cla-signatures` branch. Dormant until an outside
# contributor opens a PR; the owner + bots are allowlisted so they're never
# prompted. Requires a repo/org secret CLA_ASSISTANT_PAT (classic PAT, repo
# scope) so the action can record signatures.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: ${{ github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' || github.event_name == 'pull_request_target' }}
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-document: https://github.com/saucyeng/idl0-firmware/blob/main/CLA.md
          path-to-signatures: signatures/cla.json
          branch: cla-signatures
          allowlist: isaacallen73,bot*,dependabot[bot]
